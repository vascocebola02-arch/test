<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXWHYTE BC Services</title>
    <style>
        .exposicao {
    padding: 60px 20px;
    background: var(--light);
    text-align: center;
}

.exposicao h2 {
    margin-bottom: 40px;
    font-size: 2rem;
    color: var(--dark);
}

.exposicao-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    max-width: 1100px;
    margin: auto;
}

.card {
    background: var(--white);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 14px 35px rgba(0,0,0,0.15);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card h3 {
    margin: 15px 15px 8px;
    color: var(--dark);
}

.card p {
    margin: 0 15px 20px;
    color: var(--gray);
    font-size: 0.95rem;
    line-height: 1.5;
}

    </style>
</head>
<body>
    <section class="exposicao">
    <h2>Nossas Soluções</h2>

    <div class="exposicao-grid">

        <div class="card">
            <img src="imagem1.jpg" alt="">
            <h3>Captação de Clientes</h3>
            <p>Conectamos o seu negócio a clientes qualificados e prontos para comprar.</p>
        </div>

        <div class="card">
            <img src="imagem2.jpg" alt="">
            <h3>Consultoria Estratégica</h3>
            <p>Analisamos o seu negócio e criamos um plano para aumentar resultados.</p>
        </div>

        <div class="card">
            <img src="imagem3.jpg" alt="">
            <h3>Parcerias Comerciais</h3>
            <p>Ajudamos a encontrar parceiros ideais para expandir a sua empresa.</p>
        </div>

    </div>
</section>

</body>
</html>
